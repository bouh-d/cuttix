name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Ruff
        run: ruff check cuttix tests
      - name: Ruff format check
        run: ruff format --check cuttix tests

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install libpcap headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Install project + extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,gui,capture,pdf]'

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

  security:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Bandit
        run: bandit -r cuttix -c pyproject.toml || true
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit || true
